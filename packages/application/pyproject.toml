[project]
name = "pkb-application"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pkb-domain",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/application"]

[tool.uv.sources]
pkb-domain = { workspace = true }
