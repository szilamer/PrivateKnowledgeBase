[project]
name = "pkb-agents"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pkb-domain",
    "pkb-ontology",
    "langgraph>=0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agents"]

[tool.uv.sources]
pkb-domain = { workspace = true }
pkb-ontology = { workspace = true }
