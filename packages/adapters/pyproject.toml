[project]
name = "pkb-adapters"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pkb-domain",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "redis>=5.2",
    "neo4j>=5.26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/adapters"]

[tool.uv.sources]
pkb-domain = { workspace = true }
