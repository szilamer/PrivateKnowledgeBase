[project]
name = "pkb-adapters"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pkb-domain",
    "pkb-application",
    "pkb-ontology",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "redis>=5.2",
    "neo4j>=5.26",
    "httpx>=0.28",
    "celery>=5.4",
    "pypdf>=5.1",
    "pyyaml>=6.0",
    "cryptography>=43.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/adapters"]

[tool.uv.sources]
pkb-domain = { workspace = true }
pkb-application = { workspace = true }
pkb-ontology = { workspace = true }
